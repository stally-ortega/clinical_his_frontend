<!-- Paciente Create – Clinical Ethereal Form -->
<div class="page-header">
  <div class="title-with-back">
    <app-button icon="arrow_back" variant="outline" (onClick)="goBack()"></app-button>
    <div>
      <h2 class="page-title">Registrar Ingreso</h2>
      <p class="page-subtitle">Apertura de historia clínica y asignación de habitación</p>
    </div>
  </div>
</div>

<div class="form-card grain-overlay">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="admission-form">

    <!-- Sección 1: Identificación -->
    <section class="form-section">
      <h3 class="section-title">
        <span class="material-symbols-outlined">badge</span>
        Identificación del Paciente
      </h3>
      <div class="form-grid form-grid--2">
        <app-form-input controlName="documento" label="N° de Documento" placeholder="Ej. 1020304050"></app-form-input>
        <app-form-input controlName="edad" label="Edad" type="number" placeholder="Ej. 45"></app-form-input>
      </div>
      <div class="form-grid form-grid--2">
        <app-form-input controlName="nombres" label="Nombres" placeholder="Nombres completos"></app-form-input>
        <app-form-input controlName="apellidos" label="Apellidos" placeholder="Apellidos completos"></app-form-input>
      </div>
      <!-- Sexo biológico -->
      <div class="form-grid form-grid--1">
        <app-form-input 
          controlName="sexo" 
          label="Sexo biológico" 
          type="select" 
          [options]="sexoOptions">
        </app-form-input>
      </div>
    </section>

    <!-- Divisor -->
    <hr class="form-divider">

    <!-- Sección 2: Asignación Clínica -->
    <section class="form-section">
      <h3 class="section-title">
        <span class="material-symbols-outlined">bed</span>
        Asignación Clínica
      </h3>
      <div class="form-grid form-grid--2">
        <!-- Ubicación -->
        <app-form-input 
          controlName="id_ubicacion_fisica" 
          label="Unidad / Cama" 
          type="select" 
          placeholder="Asignar ubicación..."
          [options]="ubicacionesOptions()">
        </app-form-input>
        <!-- Dieta -->
        <app-form-input 
          controlName="id_tipo_dieta" 
          label="Tipo de Dieta Inicial" 
          type="select" 
          placeholder="Asignar dieta..."
          [options]="dietasOptions()">
        </app-form-input>
      </div>
    </section>

    <!-- Server error -->
    @if (store.error()) {
      <div class="server-error">
        <span class="material-symbols-outlined">error</span>
        {{ store.error() }}
      </div>
    }

    <!-- Actions -->
    <div class="form-actions">
      <app-button 
        text="Cancelar" 
        variant="outline" 
        [disabled]="store.isLoading()" 
        (onClick)="goBack()">
      </app-button>
      
      <app-button 
        text="Guardar Admisión" 
        icon="check_circle" 
        type="submit" 
        variant="primary" 
        [isLoading]="store.isLoading()" 
        [disabled]="store.isLoading()">
      </app-button>
    </div>

  </form>
</div>
